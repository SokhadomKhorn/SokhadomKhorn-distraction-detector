name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  sonarqube:
    name: SonarQube Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@master
        continue-on-error: true
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

  trivy:
    name: Trivy Security Scan
    runs-on: ubuntu-latest
    needs: sonarqube
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image for scanning
        run: docker build -t distraction-detector:scan .

      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        continue-on-error: true
        with:
          image-ref: distraction-detector:scan
          format: table
          exit-code: '1'
          severity: CRITICAL

  terraform:
    name: Terraform Provision EC2
    runs-on: ubuntu-latest
    needs: trivy
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    outputs:
      ec2_ip: ${{ steps.get_ip.outputs.ec2_ip }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: terraform
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
        run: terraform init

      - name: Terraform Plan
        working-directory: terraform
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
        run: terraform plan

      - name: Terraform Apply
        working-directory: terraform
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
        run: terraform apply -auto-approve

      - name: Get EC2 IP
        id: get_ip
        working-directory: terraform
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
        run: |
          ec2_ip=$(terraform output -raw ec2_public_ip)
          echo "ec2_ip=$ec2_ip" >> $GITHUB_OUTPUT
          echo "EC2 IP: $ec2_ip"

  deploy:
    name: Build and Deploy to EC2
    runs-on: ubuntu-latest
    needs: terraform
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t distraction-detector:latest .

      - name: Save Docker image as tar
        run: docker save distraction-detector:latest | gzip > distraction-detector.tar.gz

      - name: Wait for EC2 to be ready
        run: sleep 60

      - name: Copy image to EC2
        uses: appleboy/scp-action@master
        with:
          host: ${{ needs.terraform.outputs.ec2_ip }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          source: distraction-detector.tar.gz
          target: /home/ec2-user/

      - name: Deploy on EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ needs.terraform.outputs.ec2_ip }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker load < /home/ec2-user/distraction-detector.tar.gz
            docker stop distraction-detector 2>/dev/null || true
            docker rm distraction-detector 2>/dev/null || true
            docker run -d \
              --name distraction-detector \
              --restart unless-stopped \
              -p 5000:5000 \
              distraction-detector:latest
            echo "Deployment successful!"
